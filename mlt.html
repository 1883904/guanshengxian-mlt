<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 新增移动端视口 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>关鲜生麻辣烫-点击领折扣</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f5f5f7;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            padding-bottom: 40px;
        }
        .top-orange-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 48%;
            width: 0%;
            background: #ff7800;
            z-index: 1;
            transition: width 0.05s linear;
        }
        .pop-card {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 520px;
            margin: 40px auto 30px;
            background: #fff;
            border-radius: 20px;
            padding: 30px 16px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .pop-card h1 {
            font-size: clamp(28px,8vw,42px);
            color: #111;
            margin-bottom: 16px;
            font-weight: bold;
        }
        .pop-desc {
            font-size: clamp(16px,4vw,20px);
            color: #555;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .data-row {
            font-size: clamp(22px,6vw,34px);
            color: #222;
            margin: 18px 0;
        }
        .tip-text {
            text-align: center;
            font-size: clamp(20px,5vw,28px);
            color: #ff7800;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .discount-title {
            text-align: center;
            font-size: clamp(36px,10vw,52px);
            font-weight: 900;
            color: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .thumb {
            font-size: clamp(40px,11vw,56px);
        }
        .coupon-word {
            text-align: center;
            font-size: clamp(42px,12vw,64px);
            font-weight: 900;
            color: #000;
            margin-bottom: 36px;
        }
        .footer-data {
            text-align: center;
            font-size: clamp(18px,5vw,26px);
            color: #222;
        }
    </style>
</head>
<body id="clickArea">
    <div class="top-orange-fill" id="orangeBar"></div>
    <div class="pop-card">
        <h1>关鲜生麻辣烫</h1>
        <div class="pop-desc">
            10秒疯狂点击，填充上半屏橙色解锁<br>专属折扣
        </div>
        <div class="data-row">剩余时间：<span id="timeNum">10</span> s</div>
        <div class="data-row">点击次数：<span id="clickNum">0</span></div>
        <div class="data-row">填充进度：<span id="progressNum">0</span>%</div>
    </div>
    <div class="tip-text">点击屏幕任意位置填充橙色</div>
    <div class="discount-title">
        <span class="thumb">👍</span>
        参与有奖 全场8折
    </div>
    <div class="coupon-word">优惠券</div>
    <div class="footer-data">本次共点击<span id="finalClick">0</span>次，填充<span id="finalPro">0</span>%</div>

    <script>
        const clickArea = document.getElementById('clickArea');
        const orangeBar = document.getElementById('orangeBar');
        const timeNum = document.getElementById('timeNum');
        const clickNum = document.getElementById('clickNum');
        const progressNum = document.getElementById('progressNum');
        const finalClick = document.getElementById('finalClick');
        const finalPro = document.getElementById('finalPro');

        let totalClick = 0;
        let progress = 0;
        let timeLeft = 10;
        let timerRunning = true;

        const countDownTimer = setInterval(() => {
            timeLeft--;
            timeNum.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countDownTimer);
                timerRunning = false;
                finalClick.innerText = totalClick;
                finalPro.innerText = Math.floor(progress);
            }
        }, 1000);

        clickArea.addEventListener('click', () => {
            if (!timerRunning) return;
            totalClick++;
               // 每次点击增加4%进度（数值可调整控制填充速度）
            progress += 4;
            if (progress > 100) progress = 100;
            clickNum.innerText = totalClick;
            progressNum.innerText = Math.floor(progress);
            orangeBar.style.width = progress + '%';
        });
    </script>
</body>
</html>
